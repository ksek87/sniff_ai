name: Build Docker Images

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build backend image
      # Build context is repo root so the Dockerfile can COPY data_collection/dataset.csv
      run: docker build -f backend/Dockerfile -t sniff-ai-backend .

    - name: Build frontend image
      run: docker build -t sniff-ai-frontend ./frontend

    - name: Push images
      run: |
        docker tag sniff-ai-backend ghcr.io/ksek87/sniff_ai/backend:latest
        docker tag sniff-ai-frontend ghcr.io/ksek87/sniff_ai/frontend:latest
        docker push ghcr.io/ksek87/sniff_ai/backend:latest
        docker push ghcr.io/ksek87/sniff_ai/frontend:latest
