name: Build Docker Images

on: [push]

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Build backend image
      run: docker build -t sniff-ai-backend ./backend

    - name: Build frontend image
      run: docker build -t sniff-ai-frontend ./frontend

    - name: Push images (main branch only)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        docker tag sniff-ai-backend ghcr.io/ksek87/sniff_ai/backend:latest
        docker tag sniff-ai-frontend ghcr.io/ksek87/sniff_ai/frontend:latest
        docker push ghcr.io/ksek87/sniff_ai/backend:latest
        docker push ghcr.io/ksek87/sniff_ai/frontend:latest
