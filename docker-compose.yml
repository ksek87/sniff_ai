version: "3.8"
services:
  backend:
    image: ghcr.io/ksek87/sniff_ai/backend:latest
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - FLASK_ENV=${FLASK_ENV:-development}
    volumes:
      - ./backend:/app
      - ./data_collection:/app/data_collection:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      retries: 3
    networks:
      - app-network

  frontend:
    image: ghcr.io/ksek87/sniff_ai/frontend:latest
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
